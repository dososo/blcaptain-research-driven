<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Claim confidence example</title>
  <desc id="desc">A public example of claim cards with evidence, countercheck, boundary, and certainty grade.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#e0e7ff"/></linearGradient><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#475569" flood-opacity=".18"/></filter></defs>
  <rect width="1600" height="900" fill="#e0e7ff"/>
  <text x="90" y="100" fill="#172554" font-family="Inter,Arial,sans-serif" font-size="40" font-weight="700">Claim cards make uncertainty visible</text>
  <text x="90" y="142" fill="#475569" font-family="Inter,Arial,sans-serif" font-size="21">A public example of the final synthesis format</text>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="90" y="210" width="680" height="520" rx="28" fill="#ffffff" filter="url(#s)"/>
    <text x="130" y="265" fill="#64748b" font-size="16" font-weight="700">CLAIM 01</text>
    <text x="130" y="315" fill="#0f172a" font-size="28" font-weight="700">Python 3.13 follows HTTP 308</text>
    <text x="130" y="352" fill="#0f172a" font-size="28" font-weight="700">for GET and HEAD.</text>
    <rect x="130" y="390" width="180" height="42" rx="21" fill="#fef3c7"/><text x="166" y="418" fill="#92400e" font-size="18" font-weight="700">PROBABLE</text>
    <text x="130" y="482" fill="#334155" font-size="18" font-weight="700">Evidence</text>
    <text x="130" y="514" fill="#64748b" font-size="17">Versioned CPython source + official tests</text>
    <text x="130" y="546" fill="#64748b" font-size="17">agree on the method boundary.</text>
    <text x="130" y="610" fill="#334155" font-size="18" font-weight="700">Boundary</text>
    <text x="130" y="642" fill="#64748b" font-size="17">Source materials share upstream ancestry;</text>
    <text x="130" y="674" fill="#64748b" font-size="17">custom clients are outside scope.</text>
    <rect x="830" y="210" width="680" height="520" rx="28" fill="#0f172a" filter="url(#s)"/>
    <text x="870" y="265" fill="#94a3b8" font-size="16" font-weight="700">COUNTERCHECK</text>
    <text x="870" y="315" fill="#f8fafc" font-size="27" font-weight="700">Strongest alternative</text>
    <text x="870" y="356" fill="#cbd5e1" font-size="21">“Every HTTP method is replayed.”</text>
    <line x1="870" y1="400" x2="1460" y2="400" stroke="#334155"/>
    <text x="870" y="452" fill="#38bdf8" font-size="18" font-weight="700">TESTED</text>
    <text x="870" y="488" fill="#e2e8f0" font-size="19">POST and PUT did not reach the target.</text>
    <text x="870" y="522" fill="#e2e8f0" font-size="19">The default handler rejects them.</text>
    <text x="870" y="596" fill="#38bdf8" font-size="18" font-weight="700">STOP</text>
    <text x="870" y="632" fill="#cbd5e1" font-size="19">Coverage complete; latest pass changed</text>
    <text x="870" y="666" fill="#cbd5e1" font-size="19">no conclusion, grade, or caveat.</text>
  </g>
  <text x="90" y="820" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="16">Confirmed requires two independent primary sources; otherwise keep the grade honest.</text>
</svg>
