<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Research-driven investigation workflow</title>
  <desc id="desc">A public example showing seven investigation steps from a question to a graded conclusion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#0b1020"/><stop offset="1" stop-color="#172554"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".25"/></filter>
  </defs>
  <rect width="1600" height="900" fill="#0b1020"/>
  <circle cx="1430" cy="120" r="210" fill="#38bdf8" opacity=".08"/>
  <circle cx="120" cy="820" r="260" fill="#a78bfa" opacity=".08"/>
  <text x="100" y="110" fill="#e0f2fe" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="700">Investigation, not retrieval</text>
  <text x="100" y="155" fill="#94a3b8" font-family="Inter,Arial,sans-serif" font-size="22">Public example: HTTP 308 behavior across Python versions</text>
  <rect x="100" y="205" width="1400" height="104" rx="24" fill="#111827" stroke="#334155" filter="url(#shadow)"/>
  <text x="140" y="250" fill="#7dd3fc" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700">QUESTION</text>
  <text x="140" y="286" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="27">Does Python 3.8 or 3.13 follow HTTP 308 for every method?</text>
  <g font-family="Inter,Arial,sans-serif">
    <g transform="translate(100,370)"><rect width="300" height="170" rx="22" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/><text x="26" y="45" fill="#7dd3fc" font-size="17" font-weight="700">01 · FRAME</text><text x="26" y="82" fill="#f8fafc" font-size="20">Split by version</text><text x="26" y="112" fill="#cbd5e1" font-size="17">and HTTP method</text><text x="26" y="145" fill="#64748b" font-size="15">MECE scope</text></g>
    <g transform="translate(435,370)"><rect width="300" height="170" rx="22" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/><text x="26" y="45" fill="#7dd3fc" font-size="17" font-weight="700">02 · SURVEY</text><text x="26" y="82" fill="#f8fafc" font-size="20">Map CPython,</text><text x="26" y="112" fill="#cbd5e1" font-size="17">docs, tests, RFCs</text><text x="26" y="145" fill="#64748b" font-size="15">Source families</text></g>
    <g transform="translate(770,370)"><rect width="300" height="170" rx="22" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/><text x="26" y="45" fill="#c4b5fd" font-size="17" font-weight="700">03–04 · TRACE</text><text x="26" y="82" fill="#f8fafc" font-size="20">Read source and</text><text x="26" y="112" fill="#cbd5e1" font-size="17">cross-verify behavior</text><text x="26" y="145" fill="#64748b" font-size="15">Independent lines</text></g>
    <g transform="translate(1105,370)"><rect width="300" height="170" rx="22" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/><text x="26" y="45" fill="#c4b5fd" font-size="17" font-weight="700">05 · DISPROVE</text><text x="26" y="82" fill="#f8fafc" font-size="20">Test “all methods</text><text x="26" y="112" fill="#cbd5e1" font-size="17">are redirected”</text><text x="26" y="145" fill="#64748b" font-size="15">Strongest alternative</text></g>
  </g>
  <path d="M250 585 H1350" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="250" cy="585" r="10" fill="#38bdf8"/><circle cx="800" cy="585" r="10" fill="#a78bfa"/><circle cx="1350" cy="585" r="10" fill="#f0abfc"/>
  <rect x="100" y="640" width="670" height="140" rx="22" fill="#111827" stroke="#334155"/>
  <text x="135" y="685" fill="#f0abfc" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700">06 · GAPS &amp; ITERATE</text>
  <text x="135" y="725" fill="#e2e8f0" font-family="Inter,Arial,sans-serif" font-size="21">Name vendor patches and untested minors.</text>
  <text x="135" y="757" fill="#94a3b8" font-family="Inter,Arial,sans-serif" font-size="17">Continue only if another pass can change the result.</text>
  <rect x="830" y="640" width="670" height="140" rx="22" fill="#111827" stroke="#334155"/>
  <text x="865" y="685" fill="#f0abfc" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700">07 · GRADED CONCLUSION</text>
  <text x="865" y="725" fill="#e2e8f0" font-family="Inter,Arial,sans-serif" font-size="21">Python 3.13 follows 308 for GET/HEAD only.</text>
  <text x="865" y="757" fill="#fbbf24" font-family="Inter,Arial,sans-serif" font-size="17">Probable · source ancestry remains a boundary</text>
  <text x="100" y="850" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="16">Research-Driven Investigation · public example · no private data</text>
</svg>
